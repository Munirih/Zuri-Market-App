apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: zuriapp-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuriapp-backend
  template:
    metadata:
      labels:
        app: zuriapp-backend
    spec:
      containers:
      - name: container-backend
        image: munirihzowe/zuriapp-backend:latest
        ports:
        - containerPort: 5000
        env:                                   
          - name: AWS_SECRET_NAME
            value: "test4-secrets"             
          - name: AWS_REGION
            value: "us-east-1"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        
    
