apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: zuri-secrets
spec:
  provider: aws
  parameters:
    region: us-east-1
    objects: |
      - objectName: "test1-secrets"
        objectType: "secretsmanager"
        jmesPath:
          - path: "API_SECRET_KEY"
            objectAlias: "API_SECRET_KEY"
          - path: "STORE_NAME"
            objectAlias: "STORE_NAME"
  secretObjects:
    - secretName: zuri-k3s-secret
      type: Opaque
      data:
        - objectName: "API_SECRET_KEY"
          key: API_SECRET_KEY
        - objectName: "STORE_NAME"
          key: STORE_NAME
