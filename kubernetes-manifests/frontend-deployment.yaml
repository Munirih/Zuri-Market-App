apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: zuriapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuriapp-frontend
  template:
    metadata:
      labels:
        app: zuriapp-frontend
    spec:
      containers:
      - name: zuriapp-frontend
        image: munirihzowe/zuriapp-frontend
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"