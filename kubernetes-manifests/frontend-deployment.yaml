apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: zuriapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuriapp-frontend
  template:
    metadata:
      labels:
        app: zuriapp-frontend
    spec:
      containers:
      - name: zuriapp-frontend
        image: munirihzowe/zuriapp-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        env:
        - name: VITE_API_URL
          value: "http://zuriapp-backend:5000"
        

      
