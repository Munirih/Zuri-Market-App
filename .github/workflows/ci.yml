name: CI Workflow

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: |
          zuriapp-backend-main/package-lock.json
          zuriapp-frontend-main/package-lock.json

    - name: Install dependencies in backend
      run: npm install 
      working-directory: zuriapp-backend-main
      
    - name: Start backend
      run: npm start &
      working-directory: zuriapp-backend-main
        
    - name: Install dependencies in frontend
      run: npm install
      working-directory: zuriapp-frontend-main
      
    - name: Start frontend
      run: npm run dev &
      working-directory: zuriapp-frontend-main 

    - name: Wait for servers
      run: |
          sleep 5
          
    - name: Test backend
      run: curl http://localhost:5000

    - name: Test frontend
      run: curl http://localhost:3000

      
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Docker Image and push
        uses: docker/build-push-action@v6
        with:
          context: ./zuriapp-frontend-main
          push: true
          tags: munirihzowe/zuriapp-frontend:latest
          
      - name: Build Backend Docker Image and push
        uses: docker/build-push-action@v7
        with:
          context: ./zuriapp-backend-main
          push: true
          tags: munirihzowe/zuriapp-backend:latest
          
      - name: Test Frontend Docker image
        run: |
          docker run -d --name test-frontend -p 3000:3000 munirihzowe/zuriapp-frontend:latest
          sleep 5
          docker ps | grep test-backend
          docker logs test-frontend
          docker stop test-frontend
      - name: Test Backend Docker image
        run: |
          docker run -d --name test-backend -p 5000:5000 munirihzowe/zuriapp-backend:latest
          sleep 5
          docker ps | grep test-backend
          docker logs test-backend
          docker stop test-backend
