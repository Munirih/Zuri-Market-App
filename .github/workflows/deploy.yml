name: CI/CD Workflow

on:
  push:
    branches: [master]

jobs:

  terraform-infrastructure:
    name: Provision Infrastructure with Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      ec2_public_ip: ${{ steps.terraform-output.outputs.ec2_public_ip }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false
        
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Terraform Init
        run: terraform init -reconfigure

      
      - name: Fix Terraform formatting
        run: terraform fmt -check -recursive


      - name: Terraform Validate
        run: terraform validate
        
      - name: Terraform Plan
        run: terraform plan -replace="module.securitygroup.aws_vpc_security_group_egress_rule.sg[0]" -out=tfplan
        env:
          TF_VAR_key_name: ${{ secrets.AWS_SSH_KEY_NAME }}
        
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: terraform-output
        run: |
          INSTANCE_IP=$(terraform output -raw ec2_public_ip)
          echo "ec2_public_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT
          echo "Instance IP: $INSTANCE_IP"
  build:
    name: Build and Test Applications
    needs: terraform-infrastructure
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: |
          zuriapp-backend-main/package-lock.json
          zuriapp-frontend-main/package-lock.json

    - name: Install dependencies in backend
      run: npm install 
      working-directory: zuriapp-backend-main
      
    - name: Start backend
      run: npm start &
      working-directory: zuriapp-backend-main
        
    - name: Install dependencies in frontend
      run: npm install
      working-directory: zuriapp-frontend-main
      
    - name: Start frontend
      run: npm run dev &
      working-directory: zuriapp-frontend-main 

    - name: Wait for servers
      run: |
          sleep 5
          
    - name: Test backend
      run: curl -f http://localhost:5000/api/store

    - name: Test frontend
      run: curl -f http://localhost:3000

  docker-build:
    name: Build DockerImages and Scan for Vulnerabilities with Trivy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./zuriapp-frontend-main
          load: true
          tags: |
            munirihzowe/zuriapp-frontend:${{ github.sha }}
            munirihzowe/zuriapp-frontend:latest

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: munirihzowe/zuriapp-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL  

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./zuriapp-backend-main
          load: true
          tags: |
            munirihzowe/zuriapp-backend:${{ github.sha }}
            munirihzowe/zuriapp-backend:latest

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: munirihzowe/zuriapp-backend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          
      - name: Test Frontend Docker image
        run: |
          docker network create test-net
          docker run -d --network test-net --name backend-service nginx:alpine
          docker run -d --network test-net --name test-frontend -p 8000:80 munirihzowe/zuriapp-frontend:latest
          sleep 10
          curl -f http://localhost:8000
          docker stop test-frontend
          
      - name: Test Backend Docker image
        run: |
          docker run -d --name test-backend -p 5000:5000 munirihzowe/zuriapp-backend:latest
          sleep 10
          docker ps | grep test-backend
          curl -f http://localhost:5000/api/store
          docker logs test-backend
          docker stop test-backend

      - name: Push Frontend Image to DockerHub
        run: |
          docker push munirihzowe/zuriapp-frontend:${{ github.sha }}
          docker push munirihzowe/zuriapp-frontend:latest

      - name: Push Backend Image to DockerHub
        run: |
          docker push munirihzowe/zuriapp-backend:${{ github.sha }}
          docker push munirihzowe/zuriapp-backend:latest

      
    
  deploy-app:
      name: Deploy Applications to Kubernetes Cluster
      runs-on: ubuntu-latest
      needs: [terraform-infrastructure, docker-build]
  
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
            
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v6
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Wait for EC2 Instance to be Ready
          run: |
            echo "Waiting for EC2 instance to be fully ready..."
            sleep 60
        

        - name: Configure SSH
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa

        - name: Add EC2 host
          run: |
            ssh-keyscan -H ${{ needs.terraform-infrastructure.outputs.ec2_public_ip}} 2>/dev/null >> ~/.ssh/known_hosts

        - name: Copy manifests
          run: |
            scp -r ./kubernetes-manifests \
              ${{ secrets.EC2_USER }}@${{ needs.terraform-infrastructure.outputs.ec2_public_ip}}:/tmp/
        - name: Update image tags in manifests
          run: |
            ssh -T ${{ secrets.EC2_USER }}@${{ needs.terraform-infrastructure.outputs.ec2_public_ip}} << EOF
            set -e
            sed -i "s|image: munirihzowe/zuriapp-backend.*|image: munirihzowe/zuriapp-backend:${{ github.sha }}|" /tmp/kubernetes-manifests/*.yaml
            sed -i "s|image: munirihzowe/zuriapp-frontend.*|image: munirihzowe/zuriapp-frontend:${{ github.sha }}|" /tmp/kubernetes-manifests/*.yaml
            EOF
        - name: Deploy Applications
          run: |
            ssh -T ${{ secrets.EC2_USER }}@${{ needs.terraform-infrastructure.outputs.ec2_public_ip}} << EOF
            set -e
            export KUBECONFIG=/home/ubuntu/.kube/config
            kubectl apply -f /tmp/kubernetes-manifests/frontend-deployment.yaml
            kubectl apply -f /tmp/kubernetes-manifests/frontend-service.yaml
            kubectl apply -f /tmp/kubernetes-manifests/backend-deployment.yaml
            kubectl apply -f /tmp/kubernetes-manifests/backend-service.yaml
            kubectl apply -f /tmp/kubernetes-manifests/ingress.yaml
              
            kubectl rollout status deployment/frontend --timeout=300s
            kubectl rollout status deployment/backend --timeout=300s
            EOF

        - name: Check Resources
          run: |
            ssh -T ${{ secrets.EC2_USER }}@${{ needs.terraform-infrastructure.outputs.ec2_public_ip}} << 'EOF'
            export KUBECONFIG=/home/ubuntu/.kube/config
            echo "Pods:"
            kubectl get pods
            echo "Services:"
            kubectl get svc
            echo "Ingress:"
            kubectl get ingress
            EOF
        - name: Deployment Info
          run: |
            echo "Application URL: http://${{ needs.terraform-infrastructure.outputs.ec2_public_ip }}"
