name: CI/CD Workflow

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: |
          zuriapp-backend-main/package-lock.json
          zuriapp-frontend-main/package-lock.json

    - name: Install dependencies in backend
      run: npm install 
      working-directory: zuriapp-backend-main
      
    - name: Start backend
      run: npm start &
      working-directory: zuriapp-backend-main
        
    - name: Install dependencies in frontend
      run: npm install
      working-directory: zuriapp-frontend-main
      
    - name: Start frontend
      run: npm run dev &
      working-directory: zuriapp-frontend-main 

    - name: Wait for servers
      run: |
          sleep 5
          
    - name: Test backend
      run: curl -f http://localhost:5000/api/store

    - name: Test frontend
      run: curl -f http://localhost:3000

      
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Docker Image and push
        uses: docker/build-push-action@v6
        with:
          context: ./zuriapp-frontend-main
          push: true
          tags: |
            munirihzowe/zuriapp-frontend:${{ github.sha }}
            munirihzowe/zuriapp-frontend:latest
          
      - name: Build Backend Docker Image and push
        uses: docker/build-push-action@v6
        with:
          context: ./zuriapp-backend-main
          push: true
          tags: |
            munirihzowe/zuriapp-backend:${{ github.sha }}
            munirihzowe/zuriapp-backend:latest
          
      - name: Test Frontend Docker image
        run: |
          docker network create test-net
          docker run -d --network test-net --name backend-service nginx:alpine
          docker run -d --network test-net --name test-frontend -p 8000:80 munirihzowe/zuriapp-frontend:latest
          sleep 10
          curl -f http://localhost:8000
          docker stop test-frontend
          
      - name: Test Backend Docker image
        run: |
          docker run -d --name test-backend -p 5000:5000 munirihzowe/zuriapp-backend:latest
          sleep 10
          docker ps | grep test-backend
          curl -f http://localhost:5000/api/store
          docker logs test-backend
          docker stop test-backend
    
  deploy:
      name: Deploy App
      runs-on: ubuntu-latest
      needs: docker
  
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
            
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v6
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Get Server public IP address by Tag
          run: |
            EC2_HOST=$(aws ec2 describe-instances \
            --region ${{ secrets.AWS_REGION }} \
            --filters "Name=tag:Name,Values=k3s-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

            if [ -z "$EC2_HOST" ] || [ "$EC2_HOST" == "None" ]; then
              echo "Could not find a running k3s-server instance"
              exit 1
            fi

            echo "EC2_HOST=$EC2_HOST" >> $GITHUB_ENV

        - name: Configure SSH
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa

        - name: Add EC2 host
          run: |
            ssh-keyscan -H $EC2_HOST 2>/dev/null >> ~/.ssh/known_hosts

        - name: Copy manifests
          run: |
            scp -r ./kubernetes-manifests \
              ${{ secrets.EC2_USER }}@$EC2_HOST:/tmp/
        - name: Update image tags in manifests
          run: |
            ssh -T ${{ secrets.EC2_USER }}@$EC2_HOST << EOF
            set -e
            sed -i "s|image: munirihzowe/zuriapp-backend.*|image: munirihzowe/zuriapp-backend:${{ github.sha }}|" /tmp/kubernetes-manifests/*.yaml
            sed -i "s|image: munirihzowe/zuriapp-frontend.*|image: munirihzowe/zuriapp-frontend:${{ github.sha }}|" /tmp/kubernetes-manifests/*.yaml
            EOF
        - name: Deploy Applications
          run: |
            ssh -T ${{ secrets.EC2_USER }}@$EC2_HOST << EOF
            set -e
            kubectl apply -f /tmp/kubernetes-manifests/secret-provider.yaml
            kubectl apply -f /tmp/kubernetes-manifests/frontend-deployment.yaml
            kubectl apply -f /tmp/kubernetes-manifests/frontend-service.yaml
            kubectl apply -f /tmp/kubernetes-manifests/backend-deployment.yaml
            kubectl apply -f /tmp/kubernetes-manifests/backend-service.yaml
            kubectl apply -f /tmp/kubernetes-manifests/ingress.yaml
              
            kubectl rollout status deployment/frontend --timeout=300s
            kubectl rollout status deployment/backend --timeout=300s
            EOF

        - name: Check Resources
          run: |
            ssh -T ${{ secrets.EC2_USER }}@$EC2_HOST << 'EOF'
            echo "Pods:"
            kubectl get pods
            echo "Services:"
            kubectl get svc
            echo "Ingress:"
            kubectl get ingress
            EOF
        - name: Deployment Info
          run: |
            echo "Application URL: http://$EC2_HOST"
