name: Build Docker Images and Push to Docker Hub

on:
  workflow_run:
    workflows: ["Build and Test Node.js App"]
    types: [completed]
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Docker Image and push
        uses: docker/build-push-action@v6
        with:
          context: ./zuriapp-frontend-main
          push: true
          tags: munirihzowe/zuriapp-frontend:latest
          
      - name: Build Backend Docker Image and push
        uses: docker/build-push-action@v7
        with:
          context: ./zuriapp-backend-main
          push: true
          tags: munirihzowe/zuriapp-backend:latest
          
      - name: Test Frontend Docker image
        run: |
          docker run -d --name test-frontend -p 3000:3000 munirihzowe/zuriapp-frontend:latest
          sleep 5
          docker ps | grep test-frontend
          docker logs test-frontend
          docker stop test-frontend

      - name: Test Backend Docker image
        run: |
          docker run -d --name test-backend -p 5000:5000 munirihzowe/zuriapp-backend:latest
          sleep 5
          docker ps | grep test-backend
          docker logs test-backend
          docker stop test-backend
